version: "3.9"

x-airflow-common: &airflow-common
  build: .
  env_file: .env
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN}
    AIRFLOW__CORE__FERNET_KEY: ""
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_FOLDER: /app/dags
    PYTHONPATH: /app
  volumes:
    - ./dags:/app/dags
    - ./pipelines:/app/pipelines
    - ./extract:/app/extract
    - ./transform:/app/transform
    - ./load:/app/load
    - ./reports:/app/reports
    - ./config.py:/app/config.py
  depends_on:
    postgres:
      condition: service_healthy

services:

  # ── Data sources ───────────────────────────────────────────────────────────

  hbase:
    image: harisekhon/hbase:latest
    container_name: andls-hbase
    restart: always
    hostname: hbase
    environment:
      - HBASE_MANAGES_ZK=true
    ports:
      - "16010:16010"
    volumes:
      - andls-hbase-data:/hbase-data
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181"]
      interval: 10s
      retries: 15
      start_period: 40s

  opentsdb:
    image: petergrace/opentsdb-docker:latest
    container_name: andls-opentsdb
    restart: always
    ports:
      - "4242:4242"
    environment:
      - TSD_BIND=0.0.0.0
      - ZK_QUORUM=hbase:2181
      - TSD_CORE_AUTO_CREATE_METRICS=true
    depends_on:
      hbase:
        condition: service_healthy
    volumes:
      - andls-opentsdb-cache:/tmp/opentsdb

  opensearch-node:
    image: opensearchproject/opensearch:latest
    container_name: andls-opensearch
    environment:
      - cluster.name=opensearch-cluster
      - node.name=opensearch-node
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_PASSWORD}
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - andls-opensearch-data:/usr/share/opensearch/data
    ports:
      - "9200:9200"
      - "9600:9600"
    healthcheck:
      test: ["CMD", "curl", "-fk", "-u", "admin:${OPENSEARCH_PASSWORD}", "https://localhost:9200/_cluster/health"]
      interval: 15s
      retries: 15
      start_period: 60s

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:latest
    container_name: andls-dashboards
    ports:
      - "5601:5601"
    environment:
      - OPENSEARCH_HOSTS=["https://opensearch-node:9200"]
      - OPENSEARCH_USERNAME=admin
      - OPENSEARCH_PASSWORD=${OPENSEARCH_PASSWORD}
    depends_on:
      opensearch-node:
        condition: service_healthy

  # ── Relational storage ─────────────────────────────────────────────────────

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}", "-d", "${POSTGRES_DB}"]
      interval: 5s
      retries: 5

  # ── Airflow ─────────────────────────────────────────────────────────────────

  airflow-init:
    <<: *airflow-common
    command: >
      bash -c "airflow db migrate && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com"
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    command: airflow webserver
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  airflow-scheduler:
    <<: *airflow-common
    command: airflow scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # ── Dashboard ───────────────────────────────────────────────────────────────

  grafana:
    image: grafana/grafana:10.4.0
    container_name: andls-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SECURITY_ADMIN_USER: admin
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── One-time ingestion service ─────────────────────────────────────────────

  ingest:
    build: .
    container_name: andls-ingest-once
    command: python ingest/run_all.py
    env_file: .env
    environment:
      PYTHONPATH: /app
    volumes:
      - .:/app
    depends_on:
      opensearch-node:
        condition: service_healthy
      opentsdb:
        condition: service_started
    restart: "no"

volumes:
  andls-hbase-data:
    external: true
  andls-opentsdb-cache:
    external: true
  andls-opensearch-data:
    external: true
  postgres_data:
  grafana_data: